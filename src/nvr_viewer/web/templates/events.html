<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVR Events Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    nvr: {
                        bg: '#0d0d0d',
                        card: '#1a1a1a',
                        border: '#252525',
                        accent: '#333',
                    },
                },
            },
        },
    }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .events-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            padding: 1rem;
        }
        @media (min-width: 640px) {
            .events-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
        @media (min-width: 768px) {
            .events-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        }
        @media (min-width: 1024px) {
            .events-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
        }
        @media (min-width: 1280px) {
            .events-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
        }
        .event-card {
            position: relative;
            overflow: hidden;
            border: 1px solid #252525;
            border-radius: 0.75rem;
            background: #1a1a1a;
            cursor: pointer;
            transition: border-color .2s, transform .2s, box-shadow .2s;
        }
        .event-card:hover {
            border-color: #52525b;
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, .28);
        }
        .event-card.selected {
            border-color: #22c55e;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, .28);
        }
        .event-thumb {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #111;
        }
        .event-thumb img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .3s;
        }
        .event-card:hover .event-thumb img { transform: scale(1.04); }
        .event-thumb-placeholder {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #52525b;
            font-size: .8125rem;
            text-align: center;
        }
        .event-play-icon,
        .event-photo-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
        }
        .event-card:hover .event-play-icon,
        .event-card:hover .event-photo-icon {
            opacity: 1;
        }
        .event-play-icon::after,
        .event-photo-icon::after {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            background: rgba(0, 0, 0, .72);
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .35);
        }
        .event-play-icon::after {
            content: '▶';
            width: 2.75rem;
            height: 2.75rem;
            font-size: 1rem;
        }
        .event-photo-icon::after {
            content: '📷';
            width: 2.5rem;
            height: 2.5rem;
            font-size: 1rem;
        }
        .event-type-badge {
            position: absolute;
            top: .5rem;
            left: .5rem;
            padding: .25rem .5rem;
            border-radius: 9999px;
            color: #fff;
            font-size: .625rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        .event-select {
            position: absolute;
            top: .5rem;
            right: .5rem;
            z-index: 2;
            width: 1.5rem;
            height: 1.5rem;
            cursor: pointer;
            accent-color: #22c55e;
        }
        .event-info {
            display: flex;
            flex-direction: column;
            gap: .25rem;
            padding: .75rem;
        }
        .event-label,
        .event-meta {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .event-label {
            color: #f4f4f5;
            font-size: .875rem;
            font-weight: 600;
        }
        .event-meta {
            color: #a1a1aa;
            font-size: .75rem;
        }
        .event-time {
            color: #71717a;
            font-size: .75rem;
        }
        .event-filename {
            color: #71717a;
            font-size: .6875rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            word-break: break-all;
        }
        .loading,
        .empty {
            display: flex;
            min-height: 16rem;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            text-align: center;
            color: #71717a;
        }
        .loading { gap: .75rem; }
        .spinner {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #3f3f46;
            border-top-color: #d4d4d8;
            border-radius: 9999px;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .lightbox { display: none; }
        .lightbox.open { display: flex; }
        .lightbox img,
        .lightbox video {
            max-width: 94vw;
            max-height: 78vh;
            border-radius: 1rem;
            object-fit: contain;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .45);
        }
        .pagination {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            padding: 0 1rem 1.5rem;
        }
        .page-btn {
            min-height: 2.75rem;
            min-width: 2.75rem;
            padding: .625rem .875rem;
            border: 1px solid #3f3f46;
            border-radius: .75rem;
            background: #18181b;
            color: #e4e4e7;
            font-size: .875rem;
            line-height: 1;
            cursor: pointer;
            transition: background .2s, border-color .2s, color .2s;
        }
        .page-btn:hover {
            border-color: #52525b;
            background: #27272a;
        }
        .page-btn.active {
            border-color: #22c55e;
            background: #16a34a;
            color: #fff;
            cursor: default;
        }
        .page-btn:disabled {
            opacity: .45;
            cursor: not-allowed;
        }
        .page-info {
            color: #71717a;
            font-size: .875rem;
            padding: 0 .125rem;
        }
    </style>
<script>
function apiUrl(path) { return (window.BASE_URL||'') + path; }
</script>
</head>
<body class="dark min-h-screen bg-nvr-bg text-zinc-100 antialiased">
    <header class="sticky top-0 z-50 border-b border-nvr-border bg-black/85 backdrop-blur">
        <div class="mx-auto flex max-w-screen-2xl flex-col gap-3 px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8">
            <div class="flex min-w-0 flex-col gap-3 sm:flex-row sm:items-center">
                <a href="/" class="inline-flex min-h-11 items-center text-sm font-medium text-zinc-400 transition hover:text-white">← Back to NVR</a>
                <h1 class="text-lg font-semibold tracking-tight text-white sm:text-xl">📸 Events Gallery</h1>
            </div>
            <span class="text-sm text-zinc-400 sm:text-right" id="event-count"></span>
        </div>
    </header>

    <div class="sticky top-[76px] z-40 border-b border-nvr-border bg-zinc-950/95 backdrop-blur">
        <div class="mx-auto flex max-w-screen-2xl flex-col gap-3 px-4 py-3 sm:flex-row sm:flex-wrap sm:items-end sm:px-6 lg:px-8">
            <div class="flex w-full flex-col gap-1 sm:w-auto sm:min-w-44">
                <label class="text-xs font-medium uppercase tracking-[0.12em] text-zinc-500" for="filter-type">Type</label>
                <select id="filter-type" class="min-h-11 w-full rounded-xl border border-zinc-700 bg-zinc-900 px-3 text-sm text-zinc-100 outline-none transition focus:border-zinc-500 focus:ring-2 focus:ring-zinc-700 sm:w-auto">
                <option value="">All</option>
                <option value="motion">Motion</option>
                <option value="person">Person</option>
                <option value="vehicle">Vehicle</option>
                <option value="face">Face</option>
                <option value="animal">Animal</option>
                <option value="object">Object</option>
                </select>
            </div>
            <div class="flex w-full flex-col gap-1 sm:w-auto sm:min-w-52">
                <label class="text-xs font-medium uppercase tracking-[0.12em] text-zinc-500" for="filter-camera">Camera</label>
                <select id="filter-camera" class="min-h-11 w-full rounded-xl border border-zinc-700 bg-zinc-900 px-3 text-sm text-zinc-100 outline-none transition focus:border-zinc-500 focus:ring-2 focus:ring-zinc-700 sm:w-auto">
                <option value="">All cameras</option>
                </select>
            </div>
            <div class="flex w-full flex-col gap-1 sm:w-auto sm:min-w-36">
                <label class="text-xs font-medium uppercase tracking-[0.12em] text-zinc-500" for="filter-limit">Per page</label>
                <select id="filter-limit" class="min-h-11 w-full rounded-xl border border-zinc-700 bg-zinc-900 px-3 text-sm text-zinc-100 outline-none transition focus:border-zinc-500 focus:ring-2 focus:ring-zinc-700 sm:w-auto">
                <option value="24" selected>24</option>
                <option value="48">48</option>
                <option value="96">96</option>
                </select>
            </div>
            <div class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row sm:items-center sm:pt-[1.35rem]">
                <button class="inline-flex min-h-11 w-full items-center justify-center rounded-xl border border-zinc-700 bg-zinc-900 px-4 text-sm font-medium text-zinc-100 transition hover:border-zinc-500 hover:bg-zinc-800 sm:w-auto" id="btn-refresh" onclick="loadEvents()">↻ Refresh</button>
                <button class="inline-flex min-h-11 w-full items-center justify-center rounded-xl border border-zinc-700 bg-zinc-900 px-4 text-sm font-medium text-zinc-100 transition hover:border-zinc-500 hover:bg-zinc-800 sm:w-auto" id="btn-select-all" onclick="selectAll()" style="display:none;">Select All</button>
                <button class="inline-flex min-h-11 w-full items-center justify-center rounded-xl border border-red-500/40 bg-red-600/90 px-4 text-sm font-medium text-white transition hover:bg-red-500 disabled:cursor-not-allowed disabled:opacity-50 sm:w-auto" id="btn-delete" onclick="deleteSelected()" style="display:none;" disabled>🗑 Delete (0)</button>
            </div>
        </div>
    </div>

    <div class="mx-auto w-full max-w-screen-2xl" id="events-container">
        <div class="loading"><div class="spinner"></div> Loading events…</div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox fixed inset-0 z-50 flex-col items-center justify-center gap-4 bg-black/95 px-4 py-6" id="lightbox" onclick="if(event.target===this)closeLightbox()">
        <img id="lb-img" src="" alt="" style="display:none;">
        <video id="lb-video" src="" controls style="display:none;"></video>
        <div class="max-w-[90vw] text-center text-sm text-zinc-300 sm:text-base" id="lb-caption"></div>
        <button class="absolute right-4 top-4 inline-flex min-h-11 min-w-11 items-center justify-center rounded-full bg-white/10 text-3xl leading-none text-white transition hover:bg-white/20" onclick="closeLightbox()" type="button">&times;</button>
        <button class="absolute left-2 top-1/2 inline-flex min-h-11 min-w-11 -translate-y-1/2 items-center justify-center rounded-full bg-white/10 px-3 text-4xl leading-none text-white transition hover:bg-white/20 sm:left-4" onclick="navLightbox(-1)" type="button">‹</button>
        <button class="absolute right-2 top-1/2 inline-flex min-h-11 min-w-11 -translate-y-1/2 items-center justify-center rounded-full bg-white/10 px-3 text-4xl leading-none text-white transition hover:bg-white/20 sm:right-4" onclick="navLightbox(1)" type="button">›</button>
    </div>

    <script>
    const escape = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const typeColors = { motion:'#f39c12', person:'#2ecc71', vehicle:'#3498db', face:'#e74c3c', animal:'#9b59b6', object:'#1abc9c' };

    let allEvents = [];
    let cameras = [];
    let currentIndex = -1;
    let currentPage = 1;
    let totalEvents = 0;
    let perPage = 24;
    let selectMode = false;
    let selectedIds = new Set();

    function getPerPage() {
        return parseInt(document.getElementById('filter-limit').value) || 24;
    }

    async function loadCameras() {
        try {
            cameras = await (await fetch((window.BASE_URL||'') + '/api/cameras')).json();
            const sel = document.getElementById('filter-camera');
            cameras.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id; opt.textContent = c.name || c.host;
                sel.appendChild(opt);
            });
        } catch(e) { console.error('Failed to load cameras', e); }
    }

    async function loadEvents(page) {
        if (page !== undefined) currentPage = page;
        perPage = getPerPage();
        const offset = (currentPage - 1) * perPage;

        const container = document.getElementById('events-container');
        container.innerHTML = '<div class="loading"><div class="spinner"></div> Loading events…</div>';

        const type = document.getElementById('filter-type').value;
        const cameraId = document.getElementById('filter-camera').value;

        let url = `${window.BASE_URL||''}/api/events?limit=${perPage}&offset=${offset}`;
        if (type) url += `&detection_type=${encodeURIComponent(type)}`;
        if (cameraId) url += `&camera_id=${cameraId}`;

        try {
            const resp = await (await fetch(url)).json();
                // Prefix API URLs with BASE_URL for reverse proxy
                const _base = window.BASE_URL || '';
                if (_base && resp.events) {
                    resp.events.forEach(ev => {
                        if (ev.snapshot_url) ev.snapshot_url = _base + ev.snapshot_url;
                        if (ev.clip_url) ev.clip_url = _base + ev.clip_url;
                    });
                }
            allEvents = resp.events || resp;
            totalEvents = resp.total || allEvents.length;
            renderGrid();
        } catch(e) {
            container.innerHTML = `<div class="empty">Failed to load events: ${e.message}</div>`;
        }
    }

    function getCameraName(id) {
        const c = cameras.find(x => x.id === id);
        return c ? (c.name || c.host) : `Cam ${id}`;
    }

    function renderGrid() {
        const container = document.getElementById('events-container');
        const totalPages = Math.ceil(totalEvents / perPage) || 1;
        const start = (currentPage - 1) * perPage + 1;
        const end = Math.min(currentPage * perPage, totalEvents);
        document.getElementById('event-count').textContent = `${start}–${end} of ${totalEvents} events`;

        if (!allEvents.length) {
            container.innerHTML = '<div class="empty">No events found matching your filters.</div>';
            return;
        }

        const grid = `<div class="events-grid">${allEvents.map((ev, i) => {
            const conf = Number(ev.confidence ?? 0);
            const pct = conf <= 1 ? conf * 100 : conf;
            const color = typeColors[ev.detection_type] || '#888';
            const hasClip = !!ev.clip_url;
            const thumb = ev.snapshot_url || '';
            const ts = ev.timestamp ? new Date(ev.timestamp.replace(' ','T') + 'Z').toLocaleString() : '';

            const fname = thumb ? thumb.split('/').pop() : '';

            return `
            <div class="event-card ${selectedIds.has(ev.id) ? 'selected' : ''}" onclick="onCardClick(event, ${i})" data-index="${i}" data-id="${ev.id}">
                <div class="event-thumb">
                    <input type="checkbox" class="event-select" ${selectedIds.has(ev.id) ? 'checked' : ''} onclick="onCheckbox(event, ${ev.id})" data-event-id="${ev.id}">
                    ${thumb ? `<img src="${escape(thumb)}" loading="lazy" alt="">` : '<div class="event-thumb-placeholder">No preview</div>'}
                    ${hasClip ? '<div class="event-play-icon"></div>' : '<div class="event-photo-icon"></div>'}
                    <span class="event-type-badge" style="background:${color}">${escape(ev.detection_type)}</span>
                </div>
                <div class="event-info">
                    <span class="event-label">${escape(ev.label || ev.detection_type)}</span>
                    <span class="event-meta">${escape(getCameraName(ev.camera_id))} · ${pct.toFixed(0)}%</span>
                    <span class="event-time">${escape(ts)}</span>
                    ${fname ? `<span class="event-filename">${escape(fname)}</span>` : ''}
                </div>
            </div>`;
        }).join('')}</div>`;

        const paginationHtml = renderPagination(totalPages);
        container.innerHTML = grid + paginationHtml;
    }

    function renderPagination(totalPages) {
        if (totalPages <= 1) return '';

        let buttons = '';
        // Prev
        buttons += `<button class="page-btn" onclick="loadEvents(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹ Prev</button>`;

        // Page numbers (show max 7 around current)
        const range = getPageRange(currentPage, totalPages, 7);
        if (range[0] > 1) {
            buttons += `<button class="page-btn" onclick="loadEvents(1)">1</button>`;
            if (range[0] > 2) buttons += `<span class="page-info">…</span>`;
        }
        for (const p of range) {
            buttons += `<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="loadEvents(${p})">${p}</button>`;
        }
        if (range[range.length - 1] < totalPages) {
            if (range[range.length - 1] < totalPages - 1) buttons += `<span class="page-info">…</span>`;
            buttons += `<button class="page-btn" onclick="loadEvents(${totalPages})">${totalPages}</button>`;
        }

        // Next
        buttons += `<button class="page-btn" onclick="loadEvents(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>Next ›</button>`;

        return `<div class="pagination">${buttons}</div>`;
    }

    function getPageRange(current, total, maxVisible) {
        const half = Math.floor(maxVisible / 2);
        let start = Math.max(1, current - half);
        let end = Math.min(total, start + maxVisible - 1);
        start = Math.max(1, end - maxVisible + 1);
        const pages = [];
        for (let i = start; i <= end; i++) pages.push(i);
        return pages;
    }

    function openLightbox(index) {
        currentIndex = index;
        const ev = allEvents[index];
        if (!ev) return;

        const img = document.getElementById('lb-img');
        const vid = document.getElementById('lb-video');
        const caption = document.getElementById('lb-caption');

        const ts = ev.timestamp ? new Date(ev.timestamp.replace(' ','T') + 'Z').toLocaleString() : '';
        caption.textContent = `${ev.detection_type} — ${ev.label || ''} · ${getCameraName(ev.camera_id)} · ${ts}`;

        if (ev.clip_url) {
            img.style.display = 'none'; img.src = '';
            vid.src = ev.clip_url; vid.style.display = 'block';
            vid.onerror = () => {
                // Clip failed — fall back to snapshot
                vid.style.display = 'none'; vid.src = '';
                if (ev.snapshot_url) { img.src = ev.snapshot_url; img.style.display = 'block'; }
            };
            vid.play().catch(() => {});
        } else if (ev.snapshot_url) {
            vid.style.display = 'none'; vid.pause(); vid.src = '';
            img.src = ev.snapshot_url; img.style.display = 'block';
        }

        document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
        const vid = document.getElementById('lb-video');
        vid.pause(); vid.src = '';
        document.getElementById('lb-img').src = '';
        document.getElementById('lightbox').classList.remove('open');
        currentIndex = -1;
    }

    function navLightbox(dir) {
        if (currentIndex < 0) return;
        let next = currentIndex + dir;
        if (next < 0) next = allEvents.length - 1;
        if (next >= allEvents.length) next = 0;
        openLightbox(next);
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        else if (e.key === 'ArrowLeft') navLightbox(-1);
        else if (e.key === 'ArrowRight') navLightbox(1);
    });

    // Filter listeners — reset to page 1 on filter change
    ['filter-type', 'filter-camera', 'filter-limit'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => loadEvents(1));
    });

    // Select mode & multi-delete
    function onCardClick(event, index) {
        // If clicking the checkbox area, let onCheckbox handle it
        if (event.target.classList.contains('event-select')) return;
        openLightbox(index);
    }

    function onCheckbox(event, id) {
        event.stopPropagation();
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        updateSelectUI();
        const card = document.querySelector(`.event-card[data-id="${id}"]`);
        if (card) card.classList.toggle('selected', selectedIds.has(id));
    }

    function toggleSelectMode() {
        // No longer needed — checkboxes always visible
    }

    function selectAll() {
        if (selectedIds.size === allEvents.length) {
            selectedIds.clear();
        } else {
            allEvents.forEach(ev => selectedIds.add(ev.id));
        }
        updateSelectUI();
        renderGrid();
    }

    function updateSelectUI() {
        const count = selectedIds.size;
        document.getElementById('btn-select-all').style.display = count > 0 || allEvents.length > 0 ? '' : 'none';
        document.getElementById('btn-delete').style.display = count > 0 ? '' : 'none';
        const delBtn = document.getElementById('btn-delete');
        delBtn.textContent = `🗑 Delete (${count})`;
        delBtn.disabled = count === 0;
        const selAllBtn = document.getElementById('btn-select-all');
        selAllBtn.textContent = selectedIds.size === allEvents.length ? 'Deselect All' : 'Select All';
    }

    async function deleteSelected() {
        const count = selectedIds.size;
        if (!count) return;
        if (!confirm(`Delete ${count} event${count > 1 ? 's' : ''} and their files? This cannot be undone.`)) return;
        try {
            const resp = await fetch((window.BASE_URL||'') + '/api/events', {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ids: [...selectedIds]}),
            });
            if (!resp.ok) throw new Error((await resp.json()).detail || resp.statusText);
            const result = await resp.json();
            selectedIds.clear();
            updateSelectUI();
            loadEvents();
        } catch(e) {
            alert(`Delete failed: ${e.message}`);
        }
    }

    // Init
    loadCameras().then(() => loadEvents(1));
    </script>
</body>
</html>
